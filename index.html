<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearing Assessment Report</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            @page { size: A4; margin: 0; }
            body { margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .pdf-page {
                width: 210mm !important;
                height: 297mm !important;
                margin: 0 !important;
                box-shadow: none !important;
                page-break-after: always;
                overflow: hidden; /* Prevents bleed */
            }
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; margin: 0; }
        .no-print { padding: 20px; max-width: 900px; margin: auto; background: white; border-bottom: 2px solid #ddd; }
        
        .pdf-page {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 20px auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header { background: #4a2060; color: white; padding: 30px 45px; text-align: left; }
        .gold-line { height: 5px; background: #c9a84c; width: 100%; }
        
        .content { padding: 35px 45px; flex-grow: 1; display: flex; flexDirection: column; gap: 20px; }
        
        .section-title { 
            color: #4a2060; 
            font-size: 20px; 
            font-weight: bold; 
            border-bottom: 2px solid #e2e8f0; 
            margin-bottom: 12px; 
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ear-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .ear-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .ear-header { padding: 8px 15px; font-weight: bold; color: white; }
        .ear-body { padding: 15px; font-size: 16px; }

        .info-block { 
            background: #f8f5fa; 
            border-radius: 10px; 
            padding: 20px; 
            border: 1px solid #d4b8e8;
            font-size: 15px;
            line-height: 1.5;
        }

        .mfr-box { 
            border: 2px solid #c9a84c; 
            background: #fdfcee; 
            border-radius: 10px; 
            padding: 20px;
        }

        .footer { 
            background: #4a2060; 
            color: white; 
            padding: 15px 45px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 12px;
        }

        input, select, textarea { 
            width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;
        }
        label { font-weight: bold; font-size: 12px; color: #666; }
        .btn-main { background: #4a2060; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
    const { useState } = React;

    function App() {
        const [view, setView] = useState('form');
        const [form, setForm] = useState({
            name: '', date: new Date().toLocaleDateString('en-GB'),
            audiologist: '', left: 'Normal', right: 'Normal',
            mfr: 'Starkey', notes: ''
        });

        const mfrData = {
            Starkey: { tag: "AI Sound & Health Tracking", perks: ["Edge Mode+ instantly optimizes speech in noise", "Integrated sensors for fall detection", "Superior rechargeable battery life"] },
            Oticon: { tag: "BrainHearing™ Technology", perks: ["Supports the brain's natural sound processing", "360° soundscape for complex environments", "Deep Neural Network trained on 12M sounds"] },
            Widex: { tag: "Pure, Natural Sound", perks: ["Zero-delay processing for the most natural audio", "Zen therapy specifically for Tinnitus management", "AI-driven SoundSense Learn personalization"] }
        };

        const getColor = (lvl) => {
            if(lvl === 'Normal') return '#2e7d32';
            if(lvl === 'Mild') return '#f9a825';
            if(lvl === 'Moderate') return '#ef6c00';
            return '#c62828';
        };

        if (view === 'form') {
            return (
                <div className="no-print">
                    <h1 style={{color: '#4a2060'}}>Report Builder</h1>
                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', marginBottom: '20px'}}>
                        <div><label>Client Name</label><input type="text" onChange={e => setForm({...form, name: e.target.value})} /></div>
                        <div><label>Audiologist</label><input type="text" onChange={e => setForm({...form, audiologist: e.target.value})} /></div>
                        <div><label>Left Ear Result</label>
                            <select onChange={e => setForm({...form, left: e.target.value})}>
                                {['Normal', 'Mild', 'Moderate', 'Severe', 'Profound'].map(l => <option key={l}>{l}</option>)}
                            </select>
                        </div>
                        <div><label>Right Ear Result</label>
                            <select onChange={e => setForm({...form, right: e.target.value})}>
                                {['Normal', 'Mild', 'Moderate', 'Severe', 'Profound'].map(l => <option key={l}>{l}</option>)}
                            </select>
                        </div>
                        <div style={{gridColumn: 'span 2'}}>
                            <label>Technology Recommended</label>
                            <select onChange={e => setForm({...form, mfr: e.target.value})}>
                                <option>Starkey</option><option>Oticon</option><option>Widex</option>
                            </select>
                        </div>
                        <div style={{gridColumn: 'span 2'}}>
                            <label>Specific Clinical Notes</label>
                            <textarea rows="3" onChange={e => setForm({...form, notes: e.target.value})} placeholder="e.g. Needs help in restaurant environments..."></textarea>
                        </div>
                    </div>
                    <button className="btn-main" onClick={() => setView('preview')}>Generate Full Page Report</button>
                </div>
            );
        }

        return (
            <div style={{background: '#555', padding: '40px 0', display: 'flex', flexDirection: 'column', alignItems: 'center'}}>
                <div className="no-print" style={{marginBottom: '20px'}}>
                    <button className="btn-main" onClick={() => window.print()}>🖨️ Print to PDF</button>
                    <button className="btn-main" style={{background: '#fff', color: '#4a2060', marginLeft: '10px', border: '1px solid #4a2060'}} onClick={() => setView('form')}>Edit Details</button>
                </div>

                <div className="pdf-page">
                    <div className="header">
                        <h1 style={{margin: 0, fontSize: '32px', fontFamily: 'Georgia, serif'}}>Hearing Assessment Report</h1>
                        <p style={{margin: '10px 0 0 0', fontSize: '18px', opacity: 0.9}}>
                            Client: <strong>{form.name || 'Valued Client'}</strong> &nbsp; | &nbsp; Date: {form.date}
                        </p>
                    </div>
                    <div className="gold-line"></div>

                    <div className="content">
                        <div className="ear-grid">
                            <div className="ear-card">
                                <div className="ear-header" style={{background: '#1565c0'}}>LEFT EAR</div>
                                <div className="ear-body">
                                    <div style={{color: getColor(form.left), fontWeight: 'bold', fontSize: '22px'}}>{form.left} Loss</div>
                                    <p style={{fontSize: '14px', color: '#666', margin: '5px 0'}}>The left ear assessment shows {form.left.toLowerCase()} difficulty in sound processing.</p>
                                </div>
                            </div>
                            <div className="ear-card">
                                <div className="ear-header" style={{background: '#d84315'}}>RIGHT EAR</div>
                                <div className="ear-body">
                                    <div style={{color: getColor(form.right), fontWeight: 'bold', fontSize: '22px'}}>{form.right} Loss</div>
                                    <p style={{fontSize: '14px', color: '#666', margin: '5px 0'}}>The right ear assessment shows {form.right.toLowerCase()} difficulty in sound processing.</p>
                                </div>
                            </div>
                        </div>

                        <div>
                            <div className="section-title">Understanding Your Hearing Health</div>
                            <div className="info-block">
                                <strong>The Brain-Hearing Connection:</strong> We don't just hear with our ears; we hear with our brain. When hearing loss is present, the brain has to work much harder to decode sound, leading to "listening fatigue." Modern hearing technology is designed to reduce this cognitive load, allowing you to focus on the conversation rather than the effort of hearing.
                                <br/><br/>
                                <strong>Early Action Matters:</strong> Treating hearing loss early helps maintain the neural pathways responsible for speech recognition. By stimulating the auditory nerve consistently, you preserve your ability to understand complex speech in noisy environments like restaurants or family gatherings.
                            </div>
                        </div>

                        <div>
                            <div className="section-title">Technology Recommendation</div>
                            <div className="mfr-box">
                                <h2 style={{margin: '0 0 5px 0', color: '#4a2060'}}>{form.mfr} Hearing Systems</h2>
                                <p style={{margin: '0 0 15px 0', fontStyle: 'italic', color: '#c9a84c', fontWeight: 'bold'}}>{mfrData[form.mfr].tag}</p>
                                <ul style={{margin: 0, paddingLeft: '20px', fontSize: '16px', lineHeight: '1.8'}}>
                                    {mfrData[form.mfr].perks.map((p, i) => <li key={i}>{p}</li>)}
                                </ul>
                            </div>
                        </div>

                        <div>
                            <div className="section-title">Audiologist Summary & Notes</div>
                            <div style={{fontSize: '16px', lineHeight: '1.6', borderLeft: '4px solid #4a2060', paddingLeft: '15px'}}>
                                {form.notes || "Based on today's clinical findings, we recommend the introduction of digital hearing technology to restore speech clarity and reduce background noise interference. This will significantly improve social engagement and long-term cognitive wellbeing."}
                            </div>
                        </div>

                        <div style={{marginTop: 'auto'}}>
                            <div className="section-title">Your Next Steps</div>
                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '15px', textAlign: 'center'}}>
                                <div style={{background: '#f1f1f1', padding: '10px', borderRadius: '5px'}}>
                                    <div style={{fontSize: '20px'}}>📅</div>
                                    <div style={{fontWeight: 'bold', fontSize: '13px'}}>Fit Appointment</div>
                                </div>
                                <div style={{background: '#f1f1f1', padding: '10px', borderRadius: '5px'}}>
                                    <div style={{fontSize: '20px'}}>🛡️</div>
                                    <div style={{fontWeight: 'bold', fontSize: '13px'}}>30-Day Trial</div>
                                </div>
                                <div style={{background: '#f1f1f1', padding: '10px', borderRadius: '5px'}}>
                                    <div style={{fontSize: '20px'}}>✨</div>
                                    <div style={{fontWeight: 'bold', fontSize: '13px'}}>Connect Discount</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="footer">
                        <div>Report Prepared by: <strong>{form.audiologist || 'Clinical Audiologist'}</strong></div>
                        <div style={{opacity: 0.7}}>Confident & Better Hearing Starts Today</div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
