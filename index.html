<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearing Assessment Report Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
    const { useState } = React;

    const B = {
      purple:      "#4a2060",
      purpleMid:   "#6b3a8a",
      purpleLight: "#f3edf8",
      purpleBorder:"#d4b8e8",
      gold:        "#c9a84c",
      goldLight:   "#fdf8ee",
      goldBorder:  "#e8d89a",
      text:        "#1a1a2e",
      muted:       "#6b7280",
      border:      "#e2e8f0",
      bg:          "#f7f4fa",
      white:       "#ffffff",
    };

    const TITLES = ["Mr", "Mrs", "Ms", "Miss", "Dr", "Prof", "Rev"];
    const LOSS_LEVELS = ["Normal","Mild","Moderate","Severe","Profound"];
    const LOSS_TYPES  = ["No Loss", "Sensorineural", "Conductive", "Mixed"];
    const MANUFACTURERS = ["Starkey","Oticon","Widex"];

    const LOSS_COLORS = {
      Normal:"#2e7d5e", Mild:"#f0a500", Moderate:"#e07b30",
      Severe:"#c94040", Profound:"#7b1fa2",
    };

    const LOSS_DESCRIPTIONS = {
      Normal:   "Your hearing falls within the normal range.",
      Mild:     "Difficulty following conversation in noise.",
      Moderate: "Speech often sounds muffled; aids highly beneficial.",
      Severe:   "Conversation is very difficult without amplification.",
      Profound: "Powerful amplification is required to hear speech.",
    };

    const MFR = {
      Starkey: {
        tagline: "Intelligent hearing technology with a personal touch",
        known: "Award-winning AI sound processing",
        highlights: [
          "Edge Mode+ AI adapts instantly to noise",
          "Integrated fall detection and health alerts",
          "Industry-leading rechargeable batteries",
          "Thrive app for personalised control",
        ],
        why: "Ideal for clients seeking health-tracking and AI features.",
      },
      Oticon: {
        tagline: "BrainHearing technology that works with your brain",
        known: "Innovative soundscape processing",
        highlights: [
          "Supports the brain's natural sound processing",
          "360 open soundscape for group settings",
          "Deep Neural Network sound training",
          "Direct streaming to iPhone and Android",
        ],
        why: "Best for natural hearing and reducing listening fatigue.",
      },
      Widex: {
        tagline: "The purest, most natural sound quality available",
        known: "Ultra-fast sound processing",
        highlights: [
          "PureSound eliminates the 'processed' sensation",
          "Zen therapy tones to manage tinnitus",
          "Fastest signal processing with zero delay",
          "SoundSense Learn AI adapts to preferences",
        ],
        why: "Preferred for the most natural, 'invisible' sound feel.",
      },
    };

    const NEXT_STEPS = [
      { icon: "🎧", title: "Free Trial", desc: "Experience the aids in your own environment." },
      { icon: "💬", title: "Consultation", desc: "Discuss fitting options with your specialist." },
      { icon: "✨", title: "Connect Offer", desc: "Get £150 off with your Connect membership." },
      { icon: "🌍", title: "Reconnect", desc: "Better hearing improves long-term brain health." },
    ];

    const SectionTitle = ({ children }) => (
      <div style={{ fontFamily:"Georgia,serif", fontSize:14, fontWeight:700, color:B.purple,
        borderBottom:`2px solid ${B.purpleMid}`, paddingBottom:3, marginBottom:8 }}>
        {children}
      </div>
    );

    const EarCard = ({ level, type, side, label }) => {
      const color = LOSS_COLORS[level] || "#aaa";
      const pct   = {Normal:5,Mild:22,Moderate:46,Severe:70,Profound:93}[level] || 0;
      return (
        <div style={{ border:`1px solid ${B.border}`, borderRadius:8, overflow:"hidden", flex:1 }}>
          <div style={{ padding:"4px 10px", fontWeight:700, fontSize:11, textTransform:"uppercase",
            background: side==="left"?"#e8f0fb":"#fdeee3", color: side==="left"?"#1565c0":"#b85c1a" }}>
            {label}
          </div>
          <div style={{ padding:"8px 10px" }}>
            <div style={{ fontFamily:"Georgia,serif", fontSize:15, fontWeight:700, color, marginBottom:2 }}>
              {level||"—"} Loss
            </div>
            <div style={{ fontSize:11, color:B.muted, marginBottom:5 }}>{type||"—"}</div>
            <div style={{ height:4, background:B.border, borderRadius:2, marginBottom:6, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${pct}%`, background:color }} />
            </div>
            <div style={{ fontSize:11, color:"#4a5568", lineHeight:1.3 }}>
              {level ? LOSS_DESCRIPTIONS[level] : ""}
            </div>
          </div>
        </div>
      );
    };

    const Card = ({ icon, title, children }) => (
      <div style={{ background:B.white, borderRadius:12, border:`1px solid ${B.border}`, overflow:"hidden", marginBottom:15 }}>
        <div style={{ background:B.purple, padding:"12px 20px", display:"flex", alignItems:"center", gap:8 }}>
          <span>{icon}</span>
          <span style={{ fontFamily:"Georgia,serif", color:"white", fontSize:16, fontWeight:700 }}>{title}</span>
        </div>
        <div style={{ padding:20 }}>{children}</div>
      </div>
    );

    function App() {
      const [form, setForm] = useState({
        title: "Mr", clientName:"", clientId:"",
        testDate: new Date().toISOString().split("T")[0],
        audiologistName:"",
        leftEar:{ level:"", type:"" }, rightEar:{ level:"", type:"" },
        manufacturer:"", notes:"",
      });
      const [tab, setTab] = useState("form");
      const [done, setDone] = useState(false);

      const set = (f,v) => setForm(p=>({...p,[f]:v}));
      const setEar = (ear,f,v) => setForm(p=>({...p,[ear]:{...p[ear],[f]:v}}));

      const mfr = MFR[form.manufacturer] || null;
      const dateStr = form.testDate ? new Date(form.testDate).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) : "";

      const totalEars = (form.leftEar.level && form.leftEar.level !== "Normal" ? 1 : 0) + (form.rightEar.level && form.rightEar.level !== "Normal" ? 1 : 0);

      return (
        <>
          <style>{`
            @media print {
              @page { size: A4 portrait; margin: 0; }
              body { margin: 0; background: white; -webkit-print-color-adjust: exact; }
              .no-print { display: none !important; }
              .pdf-page { width: 210mm; height: 297mm; margin: 0; position: relative; box-shadow: none !important; }
            }
            body { font-family: system-ui, -apple-system, sans-serif; background: ${B.bg}; color: ${B.text}; margin:0; }
            input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid ${B.border}; borderRadius: 8px; font-size: 14px; }
            .btn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
            .seg-btn { padding: 8px; border-radius: 8px; border: 1.5px solid ${B.border}; background: white; cursor: pointer; font-size: 12px; }
            .seg-btn.active { background: ${B.purple}; color: white; border-color: ${B.purple}; }
            .gen-btn { background: ${B.purple}; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; }
          `}</style>

          {tab === "form" ? (
            <div style={{ maxWidth: 800, margin: "40px auto", padding: 20 }}>
              <Card icon="👤" title="Client Details">
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 15 }}>
                  <input placeholder="Client Name" value={form.clientName} onChange={e=>set("clientName",e.target.value)} />
                  <input type="date" value={form.testDate} onChange={e=>set("testDate",e.target.value)} />
                  <input placeholder="Audiologist Name" value={form.audiologistName} onChange={e=>set("audiologistName",e.target.value)} />
                  <select value={form.manufacturer} onChange={e=>set("manufacturer",e.target.value)}>
                    <option value="">Select Manufacturer</option>
                    {MANUFACTURERS.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
              </Card>

              <Card icon="📊" title="Test Results">
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                  {["leftEar", "rightEar"].map(side => (
                    <div key={side}>
                      <div style={{ fontWeight: 700, marginBottom: 10 }}>{side === "leftEar" ? "Left" : "Right"} Ear</div>
                      <div className="btn-grid">
                        {LOSS_LEVELS.map(l => (
                          <button key={l} className={`seg-btn ${form[side].level === l ? 'active' : ''}`} onClick={() => setEar(side, "level", l)}>{l}</button>
                        ))}
                      </div>
                      <div className="btn-grid" style={{ marginTop: 10 }}>
                        {LOSS_TYPES.map(t => (
                          <button key={t} className={`seg-btn ${form[side].type === t ? 'active' : ''}`} onClick={() => setEar(side, "type", t)}>{t}</button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

              <textarea placeholder="Notes..." rows="4" style={{ marginBottom: 20 }} value={form.notes} onChange={e=>set("notes",e.target.value)}></textarea>
              <button className="gen-btn" onClick={() => { setDone(true); setTab("preview"); }}>Generate Report</button>
            </div>
          ) : (
            <div style={{ background: "#555", padding: "40px 0", minHeight: "100vh" }}>
              <div className="no-print" style={{ textAlign: "center", marginBottom: 20 }}>
                <button onClick={() => window.print()} style={{ padding: "10px 20px", marginRight: 10, cursor: "pointer" }}>Print PDF</button>
                <button onClick={() => setTab("form")} style={{ padding: "10px 20px", cursor: "pointer" }}>Edit</button>
              </div>

              {/* A4 PAGE START */}
              <div className="pdf-page" style={{ background: "white", margin: "0 auto", display: "flex", flexDirection: "column" }}>
                <div style={{ background: B.purple, color: "white", padding: "20px 30px", textAlign: "center" }}>
                  <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "Georgia, serif" }}>Hearing Assessment Report</div>
                  <div style={{ fontSize: 12, marginTop: 5, opacity: 0.9 }}>{form.clientName} | {dateStr} | Audiologist: {form.audiologistName}</div>
                </div>

                <div style={{ padding: "30px", flex: 1, display: "flex", flexDirection: "column", gap: 20 }}>
                  
                  {/* Row 1: Results */}
                  <section>
                    <SectionTitle>Assessment Summary</SectionTitle>
                    <div style={{ display: "flex", gap: 15 }}>
                      <EarCard label="Left Ear" level={form.leftEar.level} type={form.leftEar.type} side="left" />
                      <EarCard label="Right Ear" level={form.rightEar.level} type={form.rightEar.type} side="right" />
                    </div>
                  </section>

                  {/* Row 2: Understanding & Maintenance */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                    <section>
                      <SectionTitle>Understanding Your Hearing</SectionTitle>
                      <div style={{ fontSize: 11.5, lineHeight: 1.5, color: "#333" }}>
                        <p style={{ marginBottom: 8 }}><strong>Sensorineural:</strong> Usually relates to the tiny hair cells in the cochlea. Hearing aids are the primary solution.</p>
                        <p><strong>Treatment:</strong> Managing hearing loss early keeps the auditory nerve active and reduces the effort your brain uses to listen.</p>
                      </div>
                    </section>
                    <section>
                      <SectionTitle>Living with Your Aids</SectionTitle>
                      <div style={{ fontSize: 11.5, lineHeight: 1.5, color: "#333", background: B.bg, padding: 10, borderRadius: 8 }}>
                        <ul style={{ paddingLeft: 15 }}>
                          <li>Clean daily with a dry cloth or brush.</li>
                          <li>Change wax filters every 4-6 weeks.</li>
                          <li>Open battery doors (if applicable) at night.</li>
                          <li>Avoid moisture, hairspray, and heat.</li>
                        </ul>
                      </div>
                    </section>
                  </div>

                  {/* Row 3: Recommendation */}
                  <section style={{ background: B.goldLight, border: `1px solid ${B.goldBorder}`, borderRadius: 10, padding: 20 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: "Georgia, serif", fontSize: 18, fontWeight: 700, color: B.purple }}>
                          Recommended: {form.manufacturer} Technology
                        </div>
                        <div style={{ fontSize: 12, color: B.purple, marginBottom: 10 }}>{mfr?.tagline}</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                          {mfr?.highlights.map((h, i) => (
                            <div key={i} style={{ fontSize: 11, color: "#444" }}>• {h}</div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </section>

                  {/* Row 4: Next Steps */}
                  <section>
                    <SectionTitle>Your Next Steps</SectionTitle>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
                      {NEXT_STEPS.map((step, i) => (
                        <div key={i} style={{ textAlign: "center", padding: 10, background: B.purpleLight, borderRadius: 8 }}>
                          <div style={{ fontSize: 20 }}>{step.icon}</div>
                          <div style={{ fontWeight: 700, fontSize: 11, color: B.purple, margin: "4px 0" }}>{step.title}</div>
                          <div style={{ fontSize: 10, lineHeight: 1.2 }}>{step.desc}</div>
                        </div>
                      ))}
                    </div>
                  </section>

                  {/* Push footer to bottom */}
                  <div style={{ marginTop: "auto" }}>
                    <div style={{ background: B.purple, padding: "12px 20px", borderRadius: 8, color: "white", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ fontSize: 12, fontWeight: 600 }}>Better Hearing. Better Living.</div>
                      <div style={{ fontSize: 10, opacity: 0.7 }}>Report ID: {form.clientId || "RE-001"} | Confidential</div>
                    </div>
                  </div>

                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
