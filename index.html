<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearing Assessment Report</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const B = {
          purple:      "#4a2060",
          purpleMid:   "#6b3a8a",
          purpleLight: "#f3edf8",
          purpleBorder:"#d4b8e8",
          gold:        "#c9a84c",
          goldLight:   "#fdf8ee",
          goldBorder:  "#e8d89a",
          text:        "#1a1a2e",
          muted:       "#6b7280",
          border:      "#e2e8f0",
          bg:          "#f7f4fa",
          white:       "#ffffff",
        };

        const TITLES = ["Mr", "Mrs", "Ms", "Miss", "Dr", "Prof", "Rev"];
        const LOSS_LEVELS = ["Normal","Mild","Moderate","Severe","Profound"];
        const LOSS_TYPES  = ["No Loss", "Sensorineural", "Conductive", "Mixed"];
        const MANUFACTURERS = ["Starkey","Oticon","Widex"];

        const LOSS_COLORS = {
          Normal:"#2e7d5e", Mild:"#f0a500", Moderate:"#e07b30",
          Severe:"#c94040", Profound:"#7b1fa2",
        };

        const MFR = {
          Starkey: { tagline: "Intelligent technology with a personal touch", highlights: ["Edge Mode+ AI adapts instantly", "Health & fall detection alerts", "Industry-leading rechargeables"] },
          Oticon: { tagline: "BrainHearing™ works with your brain", highlights: ["360 open soundscape", "Deep Neural Network processing", "Reduced listening fatigue"] },
          Widex: { tagline: "The purest, most natural sound quality", highlights: ["Zero-delay PureSound technology", "Integrated Zen tinnitus therapy", "Continuous AI preference learning"] },
        };

        const SectionTitle = ({ children }) => (
          <div style={{ fontFamily:"Georgia,serif", fontSize:13, fontWeight:700, color:B.purple, borderBottom:`1.5px solid ${B.purpleMid}`, paddingBottom:2, marginBottom:8 }}>
            {children}
          </div>
        );

        function App() {
          const [form, setForm] = useState({
            title: "Mr", clientName:"", audiologistName:"",
            testDate: new Date().toISOString().split("T")[0],
            leftEar:{ level:"", type:"" }, rightEar:{ level:"", type:"" },
            manufacturer:"", notes:"",
          });
          const [tab, setTab] = useState("form");

          const set = (f,v) => setForm(p=>({...p,[f]:v}));
          const setEar = (ear,f,v) => setForm(p=>({...p,[ear]:{...p[ear],[f]:v}}));

          const dateStr = form.testDate ? new Date(form.testDate).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) : "";

          return (
            <>
              <style>{`
                @media print {
                  @page { size: A4; margin: 0; }
                  body { margin: 0; background: white; -webkit-print-color-adjust: exact; }
                  .no-print { display: none !important; }
                  .pdf-page { width: 210mm; height: 297mm; margin: 0 auto; position: relative; overflow: hidden; }
                }
                body { font-family: system-ui, sans-serif; background: ${B.bg}; color: ${B.text}; margin: 0; }
                .card { background: white; border-radius: 8px; border: 1px solid ${B.border}; padding: 15px; margin-bottom: 15px; }
                input, select, textarea { width: 100%; padding: 8px; border: 1px solid ${B.border}; border-radius: 4px; margin-top: 5px; box-sizing: border-box; }
                button { cursor: pointer; transition: 0.2s; }
                .gen-btn { width: 100%; padding: 15px; background: ${B.purple}; color: white; border: none; border-radius: 6px; font-weight: 700; font-size: 16px; }
              `}</style>

              {/* FORM VIEW */}
              {tab === "form" ? (
                <div style={{ maxWidth: 600, margin: "40px auto", padding: "0 20px" }}>
                  <h2 style={{ color: B.purple, marginBottom: 20 }}>Assessment Details</h2>
                  
                  <div className="card">
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 10 }}>
                       <div><label>Title</label><select value={form.title} onChange={e=>set("title",e.target.value)}>{TITLES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
                       <div><label>Client Name</label><input value={form.clientName} onChange={e=>set("clientName",e.target.value)} /></div>
                    </div>
                    <div style={{ marginTop: 10 }}><label>Audiologist</label><input value={form.audiologistName} onChange={e=>set("audiologistName",e.target.value)} /></div>
                  </div>

                  <div className="card">
                    <label>Manufacturer</label>
                    <div style={{ display: "flex", gap: 10, marginTop: 5 }}>
                      {MANUFACTURERS.map(m => (
                        <button key={m} onClick={()=>set("manufacturer",m)} style={{ flex:1, padding: 10, borderRadius: 4, border: form.manufacturer === m ? `2px solid ${B.purple}` : `1px solid ${B.border}`, background: form.manufacturer === m ? B.purpleLight : "white" }}>{m}</button>
                      ))}
                    </div>
                  </div>

                  <div className="card">
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                      {["leftEar", "rightEar"].map(ear => (
                        <div key={ear}>
                          <label><strong>{ear === "leftEar" ? "LEFT" : "RIGHT"} EAR</strong></label>
                          <select value={form[ear].level} onChange={e=>setEar(ear,"level",e.target.value)}>
                            <option value="">Level of Loss</option>
                            {LOSS_LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
                          </select>
                          <select value={form[ear].type} onChange={e=>setEar(ear,"type",e.target.value)}>
                            <option value="">Type of Loss</option>
                            {LOSS_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                          </select>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="card">
                    <label>Notes</label>
                    <textarea rows="3" value={form.notes} onChange={e=>set("notes",e.target.value)} />
                  </div>

                  <button className="gen-btn" onClick={()=>setTab("preview")}>Preview 1-Page Report</button>
                </div>
              ) : (
                /* PDF PREVIEW - 1 PAGE ONLY, NO FOOTER */
                <div style={{ background: "#525659", padding: "40px 0", display: "flex", flexDirection: "column", alignItems: "center" }}>
                  <div className="no-print" style={{ marginBottom: 20, display: "flex", gap: 10 }}>
                    <button onClick={()=>window.print()} style={{ padding: "10px 25px", background: B.purple, color: "white", border: "none", borderRadius: 4, fontWeight: "bold" }}>Print to PDF</button>
                    <button onClick={()=>setTab("form")} style={{ padding: "10px 25px", background: "white", border: "1px solid #ccc", borderRadius: 4 }}>Go Back</button>
                  </div>

                  <div className="pdf-page" style={{ background: "white", display: "flex", flexDirection: "column" }}>
                    {/* Header: All info in top bar, nothing in footer */}
                    <div style={{ background: B.purple, padding: "25px 40px", color: "white", textAlign: "center" }}>
                      <h1 style={{ margin: 0, fontFamily: "Georgia,serif", fontSize: 26 }}>Hearing Assessment Report</h1>
                      <div style={{ marginTop: 10, fontSize: 13, opacity: 0.9, letterSpacing: 0.5, textTransform: "uppercase" }}>
                        {form.title} {form.clientName} &bull; {dateStr} &bull; Audiologist: {form.audiologistName}
                      </div>
                    </div>
                    
                    <div style={{ height: 4, background: B.gold }} />

                    <div style={{ padding: "40px", flex: 1, display: "flex", flexDirection: "column", gap: 25 }}>
                      
                      <section>
                        <SectionTitle>Assessment Results</SectionTitle>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                          {[["leftEar", "Left Ear"], ["rightEar", "Right Ear"]].map(([key, label]) => (
                            <div key={key} style={{ padding: 15, border: `1px solid ${B.border}`, borderRadius: 8, background: key === "leftEar" ? "#f8faff" : "#fffaf8" }}>
                              <div style={{ fontWeight: 800, fontSize: 10, color: B.muted, textTransform: "uppercase", marginBottom: 5 }}>{label}</div>
                              <div style={{ fontSize: 18, fontWeight: 700, color: LOSS_COLORS[form[key].level] || B.text }}>{form[key].level || "Not Tested"} Loss</div>
                              <div style={{ fontSize: 12, color: B.muted }}>{form[key].type}</div>
                            </div>
                          ))}
                        </div>
                      </section>

                      {form.manufacturer && MFR[form.manufacturer] && (
                        <section>
                          <SectionTitle>Recommended Technology: {form.manufacturer}</SectionTitle>
                          <div style={{ border: `1px solid ${B.gold}`, background: B.goldLight, padding: 20, borderRadius: 8 }}>
                            <div style={{ fontWeight: 700, color: B.purple, fontSize: 14 }}>{MFR[form.manufacturer].tagline}</div>
                            <ul style={{ margin: "10px 0 0 0", paddingLeft: 20, fontSize: 11, color: "#444", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5 }}>
                              {MFR[form.manufacturer].highlights.map((h, i) => <li key={i}>{h}</li>)}
                            </ul>
                          </div>
                        </section>
                      )}

                      <section>
                        <SectionTitle>Clinical Notes</SectionTitle>
                        <div style={{ minHeight: 80, padding: 15, border: `1px solid ${B.border}`, borderRadius: 8, fontSize: 12, lineHeight: 1.5, background: "#fafafa" }}>
                          {form.notes || "Based on the results, amplification is recommended to improve speech clarity in both quiet and noisy environments."}
                        </div>
                      </section>

                      <section style={{ marginTop: "auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                         <div style={{ padding: 15, background: B.purpleLight, borderRadius: 8, borderLeft: `4px solid ${B.purple}` }}>
                            <div style={{ fontWeight: 700, color: B.purple, fontSize: 12 }}>Next Steps</div>
                            <div style={{ fontSize: 11, marginTop: 5 }}>Trial your recommended hearing aids for 14 days with no obligation.</div>
                         </div>
                         <div style={{ padding: 15, background: B.purpleLight, borderRadius: 8, borderLeft: `4px solid ${B.purple}` }}>
                            <div style={{ fontWeight: 700, color: B.purple, fontSize: 12 }}>Member Benefit</div>
                            <div style={{ fontSize: 11, marginTop: 5 }}>Connect Members receive <strong>£150 off</strong> their first pair of aids.</div>
                         </div>
                      </section>

                      <div style={{ textAlign: "center", padding: "20px 0", borderTop: `1px solid ${B.border}` }}>
                         <div style={{ fontFamily: "Georgia,serif", color: B.purple, fontWeight: "bold", fontSize: 14 }}>Better Hearing, Better Living</div>
                         <div style={{ fontSize: 10, color: B.muted, marginTop: 4 }}>This report is for informational purposes and intended to guide your hearing journey.</div>
                      </div>

                    </div>
                  </div>
                </div>
              )}
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
