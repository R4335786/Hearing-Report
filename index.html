<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearing Assessment Report Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const B = {
            purple: "#3b1a56",
            purpleMid: "#5c2d80",
            purpleLight: "#f0e9f7",
            purpleBorder: "#c9a8e0",
            purpleDeep: "#260f3a",
            gold: "#c9993a",
            goldBright: "#e8b84b",
            goldLight: "#fdf6e8",
            goldBorder: "#e0c878",
            text: "#1c1230",
            muted: "#6b7280",
            border: "#e4dded",
            bg: "#f5f0fa",
            white: "#ffffff",
            slate: "#f8f5fc",
        };

        const TITLES = ["Mr", "Mrs", "Ms", "Miss", "Dr", "Prof", "Rev"];
        const LOSS_LEVELS = ["Normal", "Mild", "Moderate", "Severe", "Profound"];
        const LOSS_TYPES = ["No Loss", "Sensorineural", "Conductive", "Mixed"];
        const MANUFACTURERS = ["Starkey", "Oticon", "Widex"];

        const LOSS_COLORS = {
            Normal: "#1a8a5e", Mild: "#d4900a", Moderate: "#d4620a",
            Severe: "#b83030", Profound: "#7b1fa2",
        };
        const LOSS_BG = {
            Normal: "#e6f7f1", Mild: "#fff4de", Moderate: "#fff0e6",
            Severe: "#fdeaea", Profound: "#f5e8ff",
        };

        const LOSS_DESCRIPTIONS = {
            Normal: "Hearing falls within the normal range. No loss detected.",
            Mild: "May struggle to follow conversations in noisy environments.",
            Moderate: "Understanding speech without a hearing aid is likely difficult.",
            Severe: "Hearing conversation unaided is very difficult. Aids strongly advised.",
            Profound: "Understanding speech without powerful amplification is extremely challenging.",
        };

        const MFR = {
            Starkey: {
                tagline: "Intelligent hearing technology with a personal touch",
                known: "Award-winning AI-powered sound processing",
                highlights: [
                    "Edge Mode+ AI adapts instantly to any environment",
                    "Healthable tech monitors activity & brain health",
                    "Integrated fall detection with loved-one alerts",
                    "Industry-leading rechargeable battery life",
                    "Thrive app for full personalised phone control",
                ],
                why: "Ideal for clients who want technology that actively supports overall wellbeing.",
            },
            Oticon: {
                tagline: "BrainHearing technology that works with your brain",
                known: "Rated among the world's most innovative hearing brands",
                highlights: [
                    "BrainHearing supports natural sound processing",
                    "360 open soundscape for effortless listening",
                    "Deep Neural Network trained on 12M real sounds",
                    "Discreet designs across a wide range of styles",
                    "Direct streaming for iPhone and Android",
                ],
                why: "Outstanding choice for natural hearing that reduces listening fatigue.",
            },
            Widex: {
                tagline: "The purest, most natural sound quality available",
                known: "Pioneers of ultra-fast sound processing technology",
                highlights: [
                    "Renowned worldwide for natural sound reproduction",
                    "PureSound eliminates the processed sensation",
                    "Zen therapy with gentle tones to ease tinnitus",
                    "Fastest signal processing — virtually zero delay",
                    "SoundSense Learn AI adapts to your preferences",
                ],
                why: "The preferred choice for clients who want hearing aids that feel invisible.",
            },
        };

        const NEXT_STEPS = [
            { icon: "🎧", title: "Book a Free Trial", desc: "No-obligation hearing aid trial." },
            { icon: "💬", title: "Speak to a Specialist", desc: "Our audiologist will guide you." },
            { icon: "✨", title: "Member Offer", desc: "Receive £150 off new aids." },
            { icon: "🌍", title: "Reconnect", desc: "Protect your cognitive health." },
        ];

        const Field = ({ label, children, span }) => (
            <div style={{ display: "flex", flexDirection: "column", gap: 4, gridColumn: span || "auto" }}>
                <label style={{ fontSize: 10, fontWeight: 600, color: B.muted, textTransform: "uppercase" }}>{label}</label>
                {children}
            </div>
        );

        const Input = (props) => (
            <input {...props} style={{ padding: "8px 11px", border: `1.5px solid ${B.border}`, borderRadius: 7, fontSize: 13, background: B.bg, outline: "none" }} />
        );

        const Select = (props) => (
            <select {...props} style={{ padding: "8px 11px", border: `1.5px solid ${B.border}`, borderRadius: 7, fontSize: 13, background: B.bg, cursor: "pointer" }} />
        );

        const FormCard = ({ icon, title, children, optional }) => (
            <div style={{ background: B.white, borderRadius: 12, border: `1px solid ${B.border}`, overflow: "hidden", marginBottom: 16 }}>
                <div style={{ background: B.purple, padding: "10px 18px", display: "flex", alignItems: "center", gap: 8 }}>
                    <span>{icon}</span>
                    <span style={{ color: "white", fontSize: 14, fontWeight: 700 }}>{title}</span>
                    {optional && <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 11 }}>(optional)</span>}
                </div>
                <div style={{ padding: 18 }}>{children}</div>
            </div>
        );

        const EarCard = ({ level, type, side, label }) => {
            const color = LOSS_COLORS[level] || "#999";
            const bg = LOSS_BG[level] || "#f5f5f5";
            return (
                <div style={{ borderRadius: 8, overflow: "hidden", border: `1.5px solid ${color}40`, background: bg }}>
                    <div style={{ background: color, padding: "4px 10px", color: "white", fontSize: 9, fontWeight: 700 }}>{label} - {type || "—"}</div>
                    <div style={{ padding: 10 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color, marginBottom: 4 }}>{level || "—"} Loss</div>
                        <div style={{ fontSize: 8.5, color: "#4a3060", lineHeight: 1.3 }}>{level ? LOSS_DESCRIPTIONS[level] : ""}</div>
                    </div>
                </div>
            );
        };

        function App() {
            const [form, setForm] = useState({
                title: "Mr", clientName: "", clientId: "",
                testDate: new Date().toISOString().split("T")[0],
                audiologistName: "",
                leftEar: { level: "", type: "" }, rightEar: { level: "", type: "" },
                manufacturer: "", notes: "",
            });
            const [tab, setTab] = useState("form");
            const [done, setDone] = useState(false);

            const set = (f, v) => setForm(p => ({ ...p, [f]: v }));
            const setEar = (ear, f, v) => setForm(p => ({ ...p, [ear]: { ...p[ear], [f]: v } }));

            const valid = form.clientName && form.audiologistName && form.leftEar.level && form.manufacturer;
            const mfr = MFR[form.manufacturer];

            return (
                <div style={{ minHeight: "100vh", background: B.bg, fontFamily: "sans-serif" }}>
                    <style>{`
                        @media print { .no-print { display:none !important; } body { background:white; } }
                        .btn-seg { padding:6px 10px; border-radius:12px; border:1px solid #ddd; font-size:11px; cursor:pointer; background:white; }
                        .btn-active { background:${B.purple}; color:white; border-color:${B.purple}; }
                        .mfr-card { padding:10px; border:2px solid #eee; border-radius:8px; cursor:pointer; text-align:center; background:white; }
                        .mfr-active { border-color:${B.purple}; background:${B.purpleLight}; }
                    `}</style>

                    <div className="no-print" style={{ background: B.purple, color: "white", padding: "15px 25px", fontWeight: "bold" }}>
                        🦻 Hearing Assessment Tool
                    </div>

                    {tab === "form" ? (
                        <div style={{ maxWidth: 650, margin: "20px auto", padding: "0 15px" }}>
                            <FormCard icon="👤" title="Basic Info">
                                <div style={{ display: "grid", gridTemplateColumns: "100px 1fr", gap: 10 }}>
                                    <Field label="Title"><Select value={form.title} onChange={e => set("title", e.target.value)}>{TITLES.map(t => <option key={t}>{t}</option>)}</Select></Field>
                                    <Field label="Client Name"><Input value={form.clientName} onChange={e => set("clientName", e.target.value)} /></Field>
                                    <Field label="ID"><Input value={form.clientId} onChange={e => set("clientId", e.target.value)} /></Field>
                                    <Field label="Audiologist"><Input value={form.audiologistName} onChange={e => set("audiologistName", e.target.value)} /></Field>
                                </div>
                            </FormCard>

                            <FormCard icon="📊" title="Results">
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 15 }}>
                                    {["leftEar", "rightEar"].map(side => (
                                        <div key={side}>
                                            <div style={{ fontWeight: "bold", fontSize: 12, marginBottom: 10 }}>{side === "leftEar" ? "Left" : "Right"} Ear</div>
                                            <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 10 }}>
                                                {LOSS_LEVELS.map(l => (
                                                    <button key={l} className={`btn-seg ${form[side].level === l ? 'btn-active' : ''}`} onClick={() => setEar(side, "level", l)}>{l}</button>
                                                ))}
                                            </div>
                                            <Select value={form[side].type} onChange={e => setEar(side, "type", e.target.value)}>
                                                <option value="">Select Type...</option>
                                                {LOSS_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                            </Select>
                                        </div>
                                    ))}
                                </div>
                            </FormCard>

                            <FormCard icon="🎧" title="Manufacturer">
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                                    {MANUFACTURERS.map(m => (
                                        <div key={m} className={`mfr-card ${form.manufacturer === m ? 'mfr-active' : ''}`} onClick={() => set("manufacturer", m)}>
                                            <div style={{ fontWeight: "bold" }}>{m}</div>
                                            <div style={{ fontSize: 10, color: "#666" }}>{MFR[m].known}</div>
                                        </div>
                                    ))}
                                </div>
                            </FormCard>

                            <button 
                                disabled={!valid}
                                onClick={() => { setDone(true); setTab("preview"); }}
                                style={{ width: "100%", padding: 15, background: B.purple, color: "white", border: "none", borderRadius: 8, fontWeight: "bold", cursor: valid ? "pointer" : "not-allowed", opacity: valid ? 1 : 0.5 }}
                            >
                                Generate Report
                            </button>
                        </div>
                    ) : (
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: 20 }}>
                            <div className="no-print" style={{ marginBottom: 20, display: "flex", gap: 10 }}>
                                <button onClick={() => setTab("form")} style={{ padding: "10px 20px", cursor: "pointer" }}>Back to Form</button>
                                <button onClick={() => window.print()} style={{ padding: "10px 20px", background: B.purple, color: "white", border: "none", borderRadius: 5, cursor: "pointer" }}>Print PDF</button>
                            </div>

                            <div style={{ width: "210mm", minHeight: "297mm", background: "white", padding: 40, boxShadow: "0 0 20px rgba(0,0,0,0.1)" }}>
                                <div style={{ borderBottom: `4px solid ${B.purple}`, paddingBottom: 20, marginBottom: 20 }}>
                                    <h1 style={{ color: B.purple, margin: 0 }}>Hearing Assessment Report</h1>
                                    <p style={{ color: "#666" }}>Client: {form.title} {form.clientName} | Date: {form.testDate}</p>
                                </div>

                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 30 }}>
                                    <EarCard level={form.leftEar.level} type={form.leftEar.type} label="Left Ear" />
                                    <EarCard level={form.rightEar.level} type={form.rightEar.type} label="Right Ear" />
                                </div>

                                {mfr && (
                                    <div style={{ background: B.goldLight, padding: 20, borderRadius: 10, border: `1px solid ${B.goldBorder}`, marginBottom: 30 }}>
                                        <h3 style={{ color: B.gold, marginTop: 0 }}>Recommended: {form.manufacturer}</h3>
                                        <p style={{ fontSize: 13 }}>{mfr.tagline}</p>
                                        <ul style={{ fontSize: 12 }}>
                                            {mfr.highlights.map((h, i) => <li key={i}>{h}</li>)}
                                        </ul>
                                    </div>
                                )}

                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10 }}>
                                    {NEXT_STEPS.map((s, i) => (
                                        <div key={i} style={{ padding: 10, border: `1px solid ${B.border}`, borderRadius: 5, textAlign: "center" }}>
                                            <div style={{ fontSize: 20 }}>{s.icon}</div>
                                            <div style={{ fontWeight: "bold", fontSize: 10 }}>{s.title}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
