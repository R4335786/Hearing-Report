    const EarCard = ({ level, type, side, label }) => {

      const segments = ["Normal","Mild","Moderate","Severe","Profound"];
      const segColors = ["#1a8a5e","#d4900a","#d4620a","#b83030","#7b1fa2"];
      const activeIdx = segments.indexOf(level);
      return (
        <div style={{ borderRadius:8, overflow:"hidden", border:`1.5px solid ${color}40`, background:bg, display:"flex", flexDirection:"column" }}>
          <div style={{ background:color, padding:"4px 10px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontWeight:700, fontSize:8.5, textTransform:"uppercase", letterSpacing:0.8, color:"white" }}>{label}</span>
            <span style={{ fontSize:7.5, color:"rgba(255,255,255,0.8)", fontWeight:500 }}>{type||"—"}</span>
          </div>
          <div style={{ padding:"7px 10px", flex:1 }}>
            <div style={{ fontFamily:"Georgia,serif", fontSize:15, fontWeight:700, color, marginBottom:5 }}>
              {level||"—"} Loss
            </div>
            <div style={{ display:"flex", gap:2, marginBottom:6 }}>
              {segments.map((s,i)=>(
                <div key={s} title={s} style={{ flex:1, height:4, borderRadius:2,
                  background: i < activeIdx ? segColors[i] : i === activeIdx ? color : "#ddd4e8",
                  opacity: i <= activeIdx ? 1 : 0.3 }} />
              ))}
            </div>
            <div style={{ fontSize:8.5, color:"#4a3060", lineHeight:1.4 }}>
              {level ? LOSS_DESCRIPTIONS[level] : ""}
            </div>
          </div>
        </div>
      );
    };
